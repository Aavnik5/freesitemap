<body>

  <main class="page">
    <div id="story-root" class="loader"><div class="skeleton-box"><div class="s-line lg"></div><div class="s-line md"></div><div class="s-line md"></div><div class="s-line sm"></div></div></div>

    <a class="nav-btn" href="index.html?tab=gifs"><i class="fas fa-magic"></i><span>Gifs</span></a>
  </nav>

  <script>
    const STORY_WORKER_BASE = "https://doodworker.aav5roy.workers.dev";

    function q(name) {
      const p = new URLSearchParams(window.location.search);
      return (p.get(name) || "").trim();
    }

    function escapeHtml(v) {
      return String(v || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function isHttpUrl(value) {
      return /^https?:\/\/[^"'<>\s]+$/i.test(String(value || "").trim());
    }

    function formatDate(value) {
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return "";
      return d.toLocaleDateString(undefined, { day: "2-digit", month: "short", year: "numeric" });
    }

    function buildCanonicalStoryUrl(sourceUrl) {
      const sid = q("sid");
      const params = new URLSearchParams();
      if (sid) params.set("sid", sid);
      if (isHttpUrl(sourceUrl)) {
        params.set("url", sourceUrl);
      }
      const query = params.toString();
      return `https://freepornx.site/story-viewer.html${query ? `?${query}` : ""}`;
    }

    async function fetchStoryDetail(storyUrl) {
      const endpoints = [
        `${STORY_WORKER_BASE}/story-detail?url=${encodeURIComponent(storyUrl)}`,
        `${STORY_WORKER_BASE}/kahani-detail?url=${encodeURIComponent(storyUrl)}`
      ];
      let lastError = "Unable to load story detail.";

      for (const endpoint of endpoints) {
        try {
          const res = await fetch(endpoint);
          if (!res.ok) {
            lastError = `HTTP ${res.status}`;
            continue;
          }
          const data = await res.json();
          if (data && data.status === 200 && data.result) return data.result;
          lastError = data && data.msg ? data.msg : lastError;
        } catch (err) {
          lastError = err.message || lastError;
        }
      }

      throw new Error(lastError);
    }

    async function fetchStoriesFeed(page = 1) {
      const endpoints = [
        `${STORY_WORKER_BASE}/stories-feed?page=${page}&per_page=24`,
        `${STORY_WORKER_BASE}/kahani-feed?page=${page}&per_page=24`
      ];
      for (const endpoint of endpoints) {
        try {
          const res = await fetch(endpoint, { cache: "no-store" });
          if (!res.ok) continue;
          const data = await res.json();
          if (data && data.status === 200 && data.result && Array.isArray(data.result.stories)) {
            return data.result.stories;
          }
        } catch {
          // try next endpoint
        }
      }
      return [];
    }

    function updateStorySeo(payload, sourceUrl) {
      const plainText = String(
        payload.paragraphs && payload.paragraphs[0]
          ? payload.paragraphs[0]
          : (payload.excerpt || "Read story on FreePornX.")
      );
      const metaDesc = plainText.length > 155 ? `${plainText.slice(0, 152)}...` : plainText;
      const fullTitle = `${String(payload.title || "Story").trim()} | FreePornX`;
      const canonicalUrl = buildCanonicalStoryUrl(sourceUrl);
      document.title = fullTitle;

      const canonical = document.querySelector('link[rel="canonical"]');
      if (canonical) canonical.setAttribute("href", canonicalUrl);
      const desc = document.querySelector('meta[name="description"]');
      if (desc) desc.setAttribute("content", metaDesc);
      const ogTitle = document.querySelector('meta[property="og:title"]');
      if (ogTitle) ogTitle.setAttribute("content", fullTitle);
      const ogDesc = document.querySelector('meta[property="og:description"]');
      if (ogDesc) ogDesc.setAttribute("content", metaDesc);
      const ogUrl = document.querySelector('meta[property="og:url"]');
      if (ogUrl) ogUrl.setAttribute("content", canonicalUrl);
      const twTitle = document.querySelector('meta[name="twitter:title"]');
      if (twTitle) twTitle.setAttribute("content", fullTitle);
      const twDesc = document.querySelector('meta[name="twitter:description"]');
      if (twDesc) twDesc.setAttribute("content", metaDesc);

      const schemaNode = document.getElementById("story-schema");
      if (schemaNode) {
        const published = payload.date ? new Date(payload.date).toISOString() : undefined;
        const image = payload.thumbnail || "https://freepornx.site/cover-adult.jpg";
        const schema = {
          "@context": "https://schema.org",
          "@type": "Article",
          "headline": payload.title || "Story",
          "description": metaDesc,
          "url": canonicalUrl,
          "datePublished": published,
          "dateModified": published,
          "image": image,
          "author": { "@type": "Organization", "name": "FreePornX" },
          "publisher": { "@type": "Organization", "name": "FreePornX" },
          "mainEntityOfPage": canonicalUrl
        };
        schemaNode.textContent = JSON.stringify(schema);
      }
    }

    function renderStory(data, sourceUrl, noticeText) {
      const root = document.getElementById("story-root");
      const title = escapeHtml(data.title || "Story");
      const date = escapeHtml(formatDate(data.date || "") || data.date || "");
      const category = escapeHtml(data.category || "");
      const htmlContent = data.content_html || `<p>${escapeHtml(data.excerpt || "Story preview loaded.")}</p>`;
      updateStorySeo(data, sourceUrl);

      root.className = "";
      root.innerHTML = `
        <article class="card-story">
          <div class="content-wrap">
            <h1 class="story-title">${title}</h1>
            <div class="meta-row">
              ${category ? `<span><i class="fas fa-book-open"></i> ${category}</span>` : ""}
              ${date ? `<span><i class="far fa-calendar-alt"></i> ${date}</span>` : ""}
            </div>
            <div class="story-content">${htmlContent}</div>
            ${noticeText ? `<div class="notice">${escapeHtml(noticeText)}</div>` : ""}
            <div class="actions">
              <a class="btn btn-danger btn-sm" href="index.html?tab=stories">Back To Stories</a>
              ${isHttpUrl(sourceUrl) ? `<a class="btn btn-outline-light btn-sm" href="${sourceUrl}" target="_blank" rel="noopener noreferrer">Open Source</a>` : ""}
            </div>
          </div>
        </article>
        <section class="related-wrap">
          <h2 class="related-title">Related Stories</h2>
          <div id="related-root" class="related-list">
            <div class="text-muted small">Loading related stories...</div>
          </div>
        </section>
      `;
    }

    function renderRelatedStories(stories, currentSourceUrl) {
      const root = document.getElementById("related-root");
      if (!root) return;

      const usable = (stories || [])
        .filter((item) => item && isHttpUrl(item.url) && item.url !== currentSourceUrl)
        .slice(0, 8);

      if (usable.length === 0) {
        root.innerHTML = `<div class="text-muted small">No related stories available right now.</div>`;
        return;
      }

      root.innerHTML = usable.map((item) => {
        const sid = item && item.story_id ? `sid=${encodeURIComponent(item.story_id)}&` : "";
        const href = `story-viewer.html?${sid}url=${encodeURIComponent(item.url)}&title=${encodeURIComponent(item.title || "")}&excerpt=${encodeURIComponent(item.excerpt || "")}&category=${encodeURIComponent(item.category || "")}&date=${encodeURIComponent(item.date || "")}`;
        const title = escapeHtml(item.title || "Story");
        const cat = escapeHtml(item.category || "Story");
        return `<a class="related-item" href="${href}">${title}<small>${cat}</small></a>`;
      }).join("");
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const sourceUrl = q("url");
      const fallback = {
        title: q("title") || "Story",
        excerpt: q("excerpt") || "Story preview is available.",
        category: q("category") || "",
        date: q("date") || "",
        content_html: `<p>${escapeHtml(q("excerpt") || "Story preview is available.")}</p>`
      };

      if (!isHttpUrl(sourceUrl)) {
        renderStory(fallback, "", "Invalid story URL.");
        return;
      }

      try {
        const detail = await fetchStoryDetail(sourceUrl);
        renderStory(detail, sourceUrl, "");
        const relatedStories = await fetchStoriesFeed(1);
        const byCategory = relatedStories.filter((item) => {
          const catA = String(item && item.category ? item.category : "").trim().toLowerCase();
          const catB = String(detail && detail.category ? detail.category : "").trim().toLowerCase();
          return catA && catB && catA === catB;
        });
        renderRelatedStories(byCategory.length ? byCategory : relatedStories, sourceUrl);
      } catch (err) {
        renderStory(
          fallback,
          sourceUrl,
          "Full story load nahi hua. Abhi preview dikh raha hai, source button se full page khol sakte ho."
        );
        const relatedStories = await fetchStoriesFeed(1);
        renderRelatedStories(relatedStories, sourceUrl);
      }
    });
  </script>
