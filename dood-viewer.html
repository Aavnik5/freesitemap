<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Opening Story...</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #070707;
      color: #fff;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    .box {
      width: min(92vw, 420px);
      padding: 16px;
      border: 1px solid #222;
      border-radius: 10px;
      background: #111;
      text-align: center;
    }
    a {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      text-decoration: none;
      background: #dc3545;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="box">
    <div id="msg">Opening story...</div>
    <a id="link" href="index.html?tab=stories">Back To Stories</a>
  </div>
  <script>
    (function () {
      const p = new URLSearchParams(window.location.search);
      const code = (p.get("code") || "").trim();
      const dl = (p.get("dl") || "").trim();
      const target = dl && /^https?:\/\//i.test(dl) ? dl : "";

      const msg = document.getElementById("msg");
      const link = document.getElementById("link");

      if (!target) {
        msg.textContent = "Invalid video link.";
        link.href = "index.html?tab=stories";
        link.textContent = "Back To Stories";
        return;
      }

      link.href = target;
      link.textContent = "Open Player";
      window.location.replace(target);
    })();
  </script>
</body>
</html>
